<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Speed Controller</h2>
    
    <div class="speed-buttons">
      <button class="speed-btn" data-speed="1">Normal</button>
      <button class="speed-btn" data-speed="20">20x</button>
      <button class="speed-btn" data-speed="50">50x</button>
      <button class="speed-btn" data-speed="100">100x</button>
      <button class="speed-btn" data-speed="200">200x</button>
      <button class="speed-btn" data-speed="500">500x</button>
      <button class="speed-btn stop-btn" data-speed="0">Stop</button>
    </div>
    <center><p>You can add or remove presets in the settings (below).</p></center>

    <div class="toggles">
      <div class="toggle-item">
        <label>
          <input type="checkbox" id="setIntervalToggle">
          setInterval
        </label>
      </div>
      <div class="toggle-item">
        <label>
          <input type="checkbox" id="setTimeoutToggle">
          setTimeout
        </label>
      </div>
      <div class="toggle-item">
        <label>
          <input type="checkbox" id="performanceToggle" checked>
          performance
        </label>
      </div>
      <div class="toggle-item">
        <label>
          <input type="checkbox" id="dateNowToggle">
          Date.now
        </label>
      </div>
      <div class="toggle-item">
        <label>
          <input type="checkbox" id="requestAnimationFrameToggle" checked>
          requestAnimationFrame
        </label>
      </div>
    </div>

    <div class="keep-alive">
      <label class="toggle-item">
        <input type="checkbox" id="keepAliveToggle">
        Keep running in background
      </label>
      <p>Best-effort: keeps the page running when another window covers the tab.</p>
    </div>

    <p>Add custom domains in the settings.</p>
    <div class="buttons">
      <button id="optionsButton">Settings</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
