<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="section">
      <h2>Speed Steps Configuration</h2>
      <p class="description">These are the speed buttons shown in the popup.</p>
      <div class="speed-steps">
        <div class="speed-steps-list" id="speedStepsList">
          <!-- Speed steps are added here dynamically -->
        </div>
        <div class="speed-step-controls">
          <input type="number" id="newSpeedStep" min="1" placeholder="Enter new speed (e.g., 15)">
          <button id="addSpeedStep">Add Speed Step</button>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button id="resetButton">Reset to Default</button>
    </div>

    <div id="saveStatus" class="status-message"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
